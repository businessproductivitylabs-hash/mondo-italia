<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mondo Italia</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

html{
    scroll-behavior:smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000000;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* PORTADA */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
    url('menupag1.png');
    background-size:cover;
    background-position:center;
    color:white;
}

.hero h1{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    margin-bottom:10px;
}

.hero p{
    font-size:1.2rem;
    margin-bottom:25px;
}

.btn-menu{
    padding:15px 40px;
    font-size:1.2rem;
    border-radius:50px;
}

/* MENÚ */

.menu-page{
    background:#000000;
    padding:0;
    margin:0;
}

.menu-page img{
    display:block;
    width:100%;
    max-width:1000px;
    height:auto;
    margin:0 auto;
}

/* WHATSAPP */

.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:9999;
}

.whatsapp a{
    background:#25D366;
    color:white;
    padding:15px 22px;
    border-radius:50px;
    text-decoration:none;
    font-weight:600;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.whatsapp a:hover{
    color:white;
    transform:scale(1.05);
}

/* RESPONSIVE */

@media(max-width:768px){

    .hero h1{
        font-size:2.7rem;
    }

    .hero p{
        font-size:1rem;
    }

    .btn-menu{
        padding:12px 30px;
        font-size:1rem;
    }

}

</style>

</head>

<body>

<section class="hero">

    <h1>Mondo Italia</h1>

    <p>Auténtico sabor italiano </p>

    <a href="#pagina1" class="btn btn-danger btn-menu">
        Ver Menú
    </a>

</section>

<section id="pagina1" class="menu-page">
    <img src="menupag1.png" alt="Menú Página 1">
</section>

<section class="menu-page">
    <img src="menupag2.png" alt="Menú Página 2">
</section>

<section class="menu-page">
    <img src="menupag3.png" alt="Menú Página 3">
</section>

<section class="menu-page">
    <img src="menupag4.png" alt="Menú Página 4">
</section>

<section class="menu-page">
    <img src="menupag5.png" alt="Menú Página 5">
</section>

<section class="menu-page">
    <img src="menupag6.png" alt="Menú Página 6">
</section>

<section class="menu-page">
    <img src="menupag7.png" alt="Menú Página 7">
</section>

<div class="whatsapp">
    <a href="https://wa.me/573103383030" target="_blank">
        📞 Pedir Ahora
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
